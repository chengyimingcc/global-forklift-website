[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[context.production.environment]
  PUBLIC_SITE_URL = "https://wegoforklift.com"
  PUBLIC_ALLOW_INDEXING = "true"
  LEAD_EMAIL = "sales@cnwegogroup.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/feeds/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "https://www.wegoforklift.com/*"
  to = "https://wegoforklift.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/"
  to = "/en/"
  status = 301
  force = true

[[redirects]]
  from = "/api/lead"
  to = "/.netlify/functions/lead"
  status = 200
